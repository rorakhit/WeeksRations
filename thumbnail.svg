<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2e2a14"/>
      <stop offset="100%" stop-color="#1a2010"/>
    </radialGradient>
    <radialGradient id="bowlGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </radialGradient>
    <radialGradient id="soupGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c4622d"/>
      <stop offset="60%" stop-color="#8b3a1a"/>
      <stop offset="100%" stop-color="#6b2a10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture lines -->
  <g opacity="0.06" stroke="#d4954a" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Outer warm ring glow behind bowl -->
  <ellipse cx="200" cy="215" rx="115" ry="105" fill="#c4622d" opacity="0.12"/>

  <!-- Bowl shadow -->
  <ellipse cx="200" cy="300" rx="100" ry="18" fill="#000" opacity="0.35"/>

  <!-- Bowl body -->
  <path d="M 90 210 Q 90 310 200 315 Q 310 310 310 210 Z" fill="url(#bowlGrad)" filter="url(#softShadow)"/>

  <!-- Bowl rim (ellipse top) -->
  <ellipse cx="200" cy="210" rx="110" ry="28" fill="#c87f38"/>
  <ellipse cx="200" cy="210" rx="110" ry="28" fill="none" stroke="#d4954a" stroke-width="2.5" opacity="0.7"/>

  <!-- Soup surface inside rim -->
  <ellipse cx="200" cy="210" rx="100" ry="22" fill="#8b3a1a"/>
  <ellipse cx="200" cy="210" rx="100" ry="22" fill="url(#soupGrad)" opacity="0.9"/>

  <!-- Soup surface shine -->
  <ellipse cx="180" cy="205" rx="35" ry="8" fill="#d4954a" opacity="0.18"/>

  <!-- Steam wisps -->
  <g stroke="#f2ead8" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55">
    <!-- Left steam -->
    <path d="M 158 195 Q 152 180 158 165 Q 164 150 158 135">
      <animate attributeName="d" dur="2.4s" repeatCount="indefinite"
        values="M 158 195 Q 152 180 158 165 Q 164 150 158 135;
                M 158 195 Q 165 180 158 165 Q 151 150 158 135;
                M 158 195 Q 152 180 158 165 Q 164 150 158 135"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="2.4s" repeatCount="indefinite"
        values="0.55;0.25;0.55"/>
    </path>
    <!-- Center steam -->
    <path d="M 200 192 Q 194 174 200 158 Q 206 142 200 126">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        values="M 200 192 Q 194 174 200 158 Q 206 142 200 126;
                M 200 192 Q 207 174 200 158 Q 193 142 200 126;
                M 200 192 Q 194 174 200 158 Q 206 142 200 126"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="2.8s" repeatCount="indefinite"
        values="0.55;0.2;0.55"/>
    </path>
    <!-- Right steam -->
    <path d="M 242 195 Q 248 180 242 165 Q 236 150 242 135">
      <animate attributeName="d" dur="2.2s" repeatCount="indefinite"
        values="M 242 195 Q 248 180 242 165 Q 236 150 242 135;
                M 242 195 Q 235 180 242 165 Q 249 150 242 135;
                M 242 195 Q 248 180 242 165 Q 236 150 242 135"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite"
        values="0.55;0.3;0.55"/>
    </path>
  </g>

  <!-- Spoon -->
  <g filter="url(#softShadow)" opacity="0.95">
    <!-- Spoon handle -->
    <rect x="290" y="155" width="9" height="95" rx="4.5" fill="#d4954a" transform="rotate(35 294.5 202)"/>
    <!-- Spoon head ellipse -->
    <ellipse cx="269" cy="192" rx="16" ry="11" fill="#d4954a" transform="rotate(35 269 192)"/>
    <ellipse cx="268" cy="190" rx="10" ry="6" fill="#c4622d" opacity="0.5" transform="rotate(35 268 190)"/>
  </g>

  <!-- Herb garnish (small green leaves on soup) -->
  <g opacity="0.85">
    <ellipse cx="185" cy="208" rx="8" ry="4" fill="#4a7c3f" transform="rotate(-20 185 208)"/>
    <ellipse cx="196" cy="205" rx="7" ry="3.5" fill="#5a9a4a" transform="rotate(10 196 205)"/>
    <ellipse cx="207" cy="209" rx="6" ry="3" fill="#4a7c3f" transform="rotate(-5 207 209)"/>
  </g>

  <!-- App name text -->
  <text x="200" y="358" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28" font-weight="800" letter-spacing="-0.5"
    fill="#f2ead8">WeeksRations</text>

  <!-- Tagline -->
  <text x="200" y="382" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" font-weight="700" letter-spacing="2"
    fill="#b8a98a" text-transform="uppercase">YOUR WEEK. SORTED.</text>

  <!-- Top label bar -->
  <rect x="140" y="28" width="120" height="22" rx="5" fill="#c4622d" opacity="0.18"/>
  <rect x="140" y="28" width="120" height="22" rx="5" fill="none" stroke="#c4622d" stroke-width="1" opacity="0.5"/>
  <text x="200" y="43" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10" font-weight="700" letter-spacing="1.5"
    fill="#d4954a">MEAL PLANNER</text>
</svg>
