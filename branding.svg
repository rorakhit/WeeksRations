<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Main background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1409"/>
      <stop offset="60%" stop-color="#111808"/>
      <stop offset="100%" stop-color="#0a0d05"/>
    </linearGradient>

    <!-- Warm glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4622d" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c4622d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c4622d" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon card gradient -->
    <radialGradient id="cardBg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </radialGradient>

    <!-- Bowl gradient -->
    <linearGradient id="bowlGrad" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="55%" stop-color="#b06a28"/>
      <stop offset="100%" stop-color="#7a3f10"/>
    </linearGradient>

    <!-- Rim gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0a55a"/>
      <stop offset="100%" stop-color="#a85f20"/>
    </linearGradient>

    <!-- Soup gradient -->
    <radialGradient id="soupGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8b3318"/>
      <stop offset="100%" stop-color="#4a1506"/>
    </radialGradient>

    <!-- UI panel gradient (faded mock) -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#242d16" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a2010" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Left fade mask -->
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e1409" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0e1409" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0e1409" stop-opacity="0"/>
    </linearGradient>

    <!-- Right fade mask -->
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e1409" stop-opacity="0"/>
      <stop offset="60%" stop-color="#0e1409" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0e1409" stop-opacity="1"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.055"/>
    </pattern>

    <!-- Glow filter for steam -->
    <filter id="steamGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Icon card shadow -->
    <filter id="cardShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <!-- Bowl glow -->
    <filter id="bowlGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ── Faded UI mock (left side) ── -->
  <g opacity="0.55">

    <!-- Header bar -->
    <rect x="40" y="40" width="580" height="64" rx="10" fill="#2e1a08" opacity="0.8"/>
    <!-- Header label -->
    <rect x="64" y="56" width="80" height="8" rx="3" fill="#b8a98a" opacity="0.5"/>
    <!-- Header title -->
    <rect x="64" y="72" width="160" height="16" rx="4" fill="#f2ead8" opacity="0.7"/>
    <!-- Header tagline -->
    <rect x="280" y="68" width="200" height="20" rx="4" fill="#d4954a" opacity="0.5"/>
    <!-- Generate button -->
    <rect x="520" y="58" width="80" height="32" rx="7" fill="#c4622d" opacity="0.6"/>

    <!-- Week label -->
    <rect x="64" y="100" width="120" height="8" rx="3" fill="#b8a98a" opacity="0.35"/>

    <!-- Cuisine theme badge -->
    <rect x="40" y="118" width="580" height="28" rx="6" fill="#c4622d" opacity="0.12"/>
    <rect x="40" y="118" width="580" height="28" rx="6" fill="none" stroke="#d4954a" stroke-width="1" opacity="0.3"/>
    <rect x="60" y="126" width="260" height="10" rx="3" fill="#d4954a" opacity="0.4"/>

    <!-- Divider -->
    <rect x="40" y="158" width="580" height="1" fill="#3a3820" opacity="0.6"/>

    <!-- Section label: DINNERS -->
    <rect x="40" y="172" width="60" height="8" rx="3" fill="#b8a98a" opacity="0.4"/>

    <!-- Meal card 1 -->
    <rect x="40" y="192" width="580" height="110" rx="12" fill="url(#panelGrad)" stroke="#3a3820" stroke-width="1"/>
    <!-- Card header -->
    <rect x="64" y="210" width="220" height="14" rx="4" fill="#f2ead8" opacity="0.65"/>
    <rect x="64" y="230" width="300" height="9" rx="3" fill="#b8a98a" opacity="0.4"/>
    <!-- Time badge -->
    <rect x="530" y="208" width="72" height="20" rx="5" fill="#c4622d" opacity="0.18"/>
    <rect x="538" y="214" width="56" height="8" rx="3" fill="#d4954a" opacity="0.45"/>
    <!-- Divider -->
    <rect x="40" y="252" width="580" height="1" fill="#3a3820" opacity="0.5"/>
    <!-- Ingredient col -->
    <rect x="64" y="264" width="8" height="8" rx="2" fill="#c4622d" opacity="0.5"/>
    <rect x="78" y="264" width="100" height="8" rx="3" fill="#b8a98a" opacity="0.35"/>
    <rect x="64" y="278" width="8" height="8" rx="2" fill="#c4622d" opacity="0.5"/>
    <rect x="78" y="278" width="130" height="8" rx="3" fill="#b8a98a" opacity="0.35"/>
    <!-- Recipe steps -->
    <rect x="280" y="264" width="20" height="20" rx="10" fill="#c4622d" opacity="0.5"/>
    <rect x="308" y="268" width="180" height="8" rx="3" fill="#f2ead8" opacity="0.35"/>
    <rect x="280" y="290" width="20" height="20" rx="10" fill="#c4622d" opacity="0.5"/>
    <rect x="308" y="294" width="200" height="8" rx="3" fill="#f2ead8" opacity="0.35"/>

    <!-- Meal card 2 -->
    <rect x="40" y="316" width="580" height="90" rx="12" fill="url(#panelGrad)" stroke="#3a3820" stroke-width="1" opacity="0.7"/>
    <rect x="64" y="334" width="190" height="14" rx="4" fill="#f2ead8" opacity="0.45"/>
    <rect x="64" y="354" width="260" height="9" rx="3" fill="#b8a98a" opacity="0.3"/>
    <rect x="40" y="376" width="580" height="1" fill="#3a3820" opacity="0.35"/>
    <rect x="64" y="388" width="8" height="8" rx="2" fill="#c4622d" opacity="0.3"/>
    <rect x="78" y="388" width="110" height="8" rx="3" fill="#b8a98a" opacity="0.25"/>

    <!-- Meal card 3 -->
    <rect x="40" y="420" width="580" height="80" rx="12" fill="url(#panelGrad)" stroke="#3a3820" stroke-width="1" opacity="0.45"/>
    <rect x="64" y="438" width="170" height="14" rx="4" fill="#f2ead8" opacity="0.3"/>
    <rect x="64" y="458" width="240" height="9" rx="3" fill="#b8a98a" opacity="0.2"/>

    <!-- Snack section -->
    <rect x="40" y="516" width="60" height="7" rx="3" fill="#b8a98a" opacity="0.3"/>
    <rect x="40" y="530" width="100" height="24" rx="12" fill="#242d16" opacity="0.6" stroke="#3a3820" stroke-width="1"/>
    <rect x="148" y="530" width="130" height="24" rx="12" fill="#242d16" opacity="0.6" stroke="#3a3820" stroke-width="1"/>
    <rect x="286" y="530" width="110" height="24" rx="12" fill="#242d16" opacity="0.6" stroke="#3a3820" stroke-width="1"/>
    <rect x="404" y="530" width="90" height="24" rx="12" fill="#242d16" opacity="0.5" stroke="#3a3820" stroke-width="1"/>

  </g>

  <!-- Left fade overlay -->
  <rect width="1200" height="630" fill="url(#leftFade)"/>
  <!-- Right fade overlay -->
  <rect width="1200" height="630" fill="url(#rightFade)"/>

  <!-- ── Icon glow halo ── -->
  <ellipse cx="870" cy="290" rx="240" ry="220" fill="url(#iconGlow)"/>

  <!-- ── Icon card ── -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="100" width="300" height="300" rx="56" fill="url(#cardBg)"/>
  </g>

  <!-- Grid on card -->
  <rect x="720" y="100" width="300" height="300" rx="56" fill="url(#grid)" opacity="0.6"/>

  <!-- Inner glow rim on card -->
  <rect x="720" y="100" width="300" height="300" rx="56" fill="none" stroke="#c4622d" stroke-width="1.5" opacity="0.25"/>

  <!-- ── Bowl icon (centered in card at 870,250) ── -->
  <g filter="url(#bowlGlow)">
    <!-- Bowl shadow -->
    <ellipse cx="870" cy="328" rx="88" ry="11" fill="#000" opacity="0.45"/>
    <!-- Bowl body -->
    <path d="M 762 248 Q 760 322 870 330 Q 980 322 978 248 Z" fill="url(#bowlGrad)"/>
    <!-- Rim -->
    <ellipse cx="870" cy="248" rx="108" ry="27" fill="url(#rimGrad)"/>
    <!-- Soup surface -->
    <ellipse cx="870" cy="248" rx="96" ry="21" fill="url(#soupGrad)"/>
    <!-- Soup highlight -->
    <ellipse cx="848" cy="241" rx="32" ry="8" fill="#d4954a" opacity="0.13"/>
    <!-- Herb garnish -->
    <ellipse cx="856" cy="248" rx="9" ry="4" fill="#3d6b32" transform="rotate(-15 856 248)"/>
    <ellipse cx="872" cy="245" rx="7" ry="3.5" fill="#4e8a3f" transform="rotate(8 872 245)"/>
    <ellipse cx="886" cy="250" rx="6" ry="3" fill="#3d6b32" transform="rotate(-5 886 250)"/>
  </g>

  <!-- Steam wisps -->
  <g filter="url(#steamGlow)" stroke="#e8c98a" stroke-linecap="round" fill="none">
    <path d="M 834 235 Q 826 212 834 190 Q 842 168 834 146" stroke-width="2.8" opacity="0.55"/>
    <path d="M 870 231 Q 862 206 870 182 Q 878 158 870 134" stroke-width="3.2" opacity="0.65"/>
    <path d="M 906 235 Q 914 212 906 190 Q 898 168 906 146" stroke-width="2.8" opacity="0.55"/>
  </g>

  <!-- Spoon -->
  <g filter="url(#bowlGlow)">
    <rect x="930" y="198" width="10" height="90" rx="5" fill="#d4954a" transform="rotate(38 935 243)"/>
    <ellipse cx="904" cy="236" rx="16" ry="11" fill="#d4954a" transform="rotate(38 904 236)"/>
    <ellipse cx="903" cy="234" rx="10" ry="6" fill="#b06a28" opacity="0.55" transform="rotate(38 903 234)"/>
  </g>

  <!-- ── Text below icon ── -->
  <text x="870" y="442" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="38" font-weight="800" letter-spacing="-0.5"
    fill="#f2ead8">WeeksRations</text>

  <text x="870" y="472" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="14" font-weight="600" letter-spacing="3.5"
    fill="#7a6548">YOUR WEEK. SORTED.</text>

  <!-- Live dot -->
  <circle cx="870" cy="500" r="4" fill="#d4954a" opacity="0.7"/>

</svg>
